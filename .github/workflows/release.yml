name: Release signed Windows app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify tag matches app version
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          if ("v$version" -ne $env:TAG_NAME) {
            throw "Tag $env:TAG_NAME does not match app version v$version"
          }

      - name: Build and publish signed installer
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "AI Usage Monitor ${{ github.ref_name }}"
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          uploadUpdaterJson: true
          tauriScript: npx tauri
          args: --bundles nsis
